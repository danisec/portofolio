services:
  app:
    image: portofolio-app-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: ${DOCKER_CONTAINER_NAME_DEV:-portofolio-dani-dev}
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    ports:
      - '${DOCKER_APP_PORT_DEV:-3000}:${APP_INTERNAL_PORT:-3000}'
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=${NEXT_TELEMETRY_DISABLED:-1}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING:-true}
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-true}
    command:
      ['npm', 'run', 'dev', '--', '--hostname', '0.0.0.0', '--port', '${APP_INTERNAL_PORT:-3000}']
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
